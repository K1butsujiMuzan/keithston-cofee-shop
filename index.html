<!doctype html>
<html lang="en">
<head>

  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <link
    rel="stylesheet"
    href="styles/index.css"

  <title>Keithston</title>
</head>
<body class="body">
  <header class="header">
    <div class="header__inner">
      <div class="header__top">
        <a
          class="header__logo logo"
          href="./index.html"
        >
          <img
            class="logo__image"
            src="assets/images/logo.png"
            alt="Keithston logo"
            width="360"
            height="360"
          />
        </a>
        <nav class="header__menu">
          <ul class="header__menu-list">
            <li class="header__menu-item">
              <a
                class="header__menu-link active"

            </li>
            <li class="header__menu-item">

                class="header__menu-link"
                href="./index.html"
              >

              </a>
            </li>
            <li class="header__menu-item">
              <a
                class="header__menu-link"
                href="./index.html"
              >
                Contact Us
              </a>
            </li>
            <li class="header__menu-item">
              <a
                class="header__menu-link"
                href="./index.html"
              >
                Services
              </a>
            </li>
          </ul>
        </nav>
      </div>
      <div class="header__middle">
        <span class="accent-text">Delicious Cafe</span>
        <h1 class="header__title">
          Sweet Treats, Perfect Eats
        </h1>
      </div>
      <div class="header__bottom">
        <a
          class="header__link link"
          href="./index.html"
        >
          Shop Now
        </a>
        <a
          class="header__link link link--transparent"
          href="./index.html"
        >
          Learn More
        </a>
      </div>
    </div>
